name: terrain-gpx
functions:
  insertGpxTerrainBlock:
    path: src/index.ts:insertGpxTerrainBlock
    command:
      name: "GPX Terrain: Insert 3D widget"
      requireEditor: page
  refreshGpxTerrainWidgets:
    path: src/index.ts:refreshGpxTerrainWidgets
    command:
      name: "GPX Terrain: Refresh widgets"
      requireEditor: page
  renderGpxTerrainWidget:
    path: src/index.ts:renderGpxTerrainWidget
    codeWidget: gpx-terrain
    renderMode: iframe
